# fly.toml app configuration file generated for saira-api on 2026-07-13T13:41:13+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'saira-api'
primary_region = 'iad'

[build]
  dockerfile = 'saira-api/Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'

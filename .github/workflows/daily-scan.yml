name: Daily scan + report

# Runs the full pipeline entirely in the cloud (2026-07 project decision — see
# full_universe_analysis.py's module docstring): no local machine needs to be
# on for this to run or for the report to stay reachable. Repo is public
# (Abdo's call, 2026-07) so GitHub Pages' free tier can serve the report
# directly — no third-party host needed.
#
# SCHEDULE CORRECTED 2026-07-18 (Abdo's explicit request): he wants the
# report at 16:00 Cairo time — 30 minutes before the US market opens (9:30 AM
# ET = 16:30 Cairo during current mutual DST) — not the old 21:00 EST/EDT
# schedule. 13:00 UTC = 16:00 Cairo (UTC+3, current summer DST for both Egypt
# and the US) = 9:00 AM EDT. NOTE: Egypt and the US don't necessarily flip
# DST on the same calendar date, so this cron will drift by up to an hour
# around late-Oct/Nov transitions — re-check then if exact timing matters.
# Same cron as ai-catch-win.yml (both land together, per Abdo's request).
# DELIVERY: this (the original/older) report stays EMAIL-ONLY, per Abdo's
# explicit instruction — the NEW "AI Catch & Win" tool (ai-catch-win.yml) is
# the one that goes to both email AND Telegram.
on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

# Only one Pages deployment at a time; never cancel one mid-deploy.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scan-and-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # Skip the rest of the run entirely on weekends/US market holidays
      # (Abdo's explicit request 2026-07-18: "خلي التحليل والتقرير يتموا أيام
      # التداول فقط") — astro_engine_1/is_trading_day.py uses
      # pandas_market_calendars' real NYSE calendar, not just a Sat/Sun
      # check, so Thanksgiving/Christmas/etc. are correctly skipped too.
      # is_trading_day.py always exits 0 and writes its true/false result to
      # $GITHUB_OUTPUT (not the exit code) — an exit-code-based version was
      # tried first in ai-catch-win.yml but made GitHub show the whole run as
      # a red "failure" even on an intentional skip (confirmed on the first
      # real run, a Saturday); this output-based version keeps every later
      # step's `if:` gate but the run itself shows green.
      - name: Check if today is a NYSE trading day
        id: trading_day
        run: python src/astro_engine_1/is_trading_day.py

      # TA-Lib is optional (advanced_technical_tools.py degrades gracefully
      # without it — see its module docstring); a failed build here should
      # never fail the whole run, just reduce one group's sub-signals.
      - name: Try installing TA-Lib (optional, non-fatal)
        if: steps.trading_day.outputs.is_trading_day == 'true'
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential wget
          wget -q https://github.com/ta-lib/ta-lib/releases/download/v0.6.4/ta-lib-0.6.4-src.tar.gz
          tar -xzf ta-lib-0.6.4-src.tar.gz
          cd ta-lib-0.6.4
          ./configure --prefix=/usr
          make
          sudo make install
          pip install TA-Lib

      - name: Configure GitHub Pages
        if: steps.trading_day.outputs.is_trading_day == 'true'
        id: pages
        uses: actions/configure-pages@v5

      - name: Run full universe scan
        if: steps.trading_day.outputs.is_trading_day == 'true'
        run: python src/full_universe_analysis.py

      # Appends today's net-buy candidates to the outcome ledger and rechecks
      # previously-pending ones, so build_report.py (next) can show a real
      # "Track record" stat — see track_outcomes.py's own docstring.
      - name: Track recommendation outcomes
        if: steps.trading_day.outputs.is_trading_day == 'true'
        run: python src/track_outcomes.py

      - name: Build report
        if: steps.trading_day.outputs.is_trading_day == 'true'
        env:
          REPORT_BASE_URL: ${{ steps.pages.outputs.base_url }}
        run: python src/build_report.py

      # Same "keep every run" archiving run_daily.ps1 does locally (see its
      # own comment), reimplemented here since this job runs on Linux, not
      # Abdo's Windows machine.
      - name: Archive this run's report
        if: steps.trading_day.outputs.is_trading_day == 'true'
        run: |
          mkdir -p runs/archive/reports
          cp runs/report.html "runs/archive/reports/report_$(date -u +%Y%m%d_%H%M%S).html"

      # GitHub Pages serves index.html for the root URL (the one emailed to
      # Abdo via page_url below); build_report.py writes report.html, so
      # without this copy the emailed root link 404s while /report.html works.
      - name: Copy report as index.html for the Pages root URL
        if: steps.trading_day.outputs.is_trading_day == 'true'
        run: cp runs/report.html runs/index.html

      - name: Commit updated results back to the repo
        if: steps.trading_day.outputs.is_trading_day == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add runs/
          git diff --cached --quiet || git commit -m "Automated daily scan $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase
          git push

      - name: Upload Pages artifact
        if: steps.trading_day.outputs.is_trading_day == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: runs

      - name: Deploy to GitHub Pages
        if: steps.trading_day.outputs.is_trading_day == 'true'
        id: deployment
        uses: actions/deploy-pages@v4

      # Emails Abdo the fresh report link every day so he doesn't have to
      # remember to check GitHub himself. Uses Resend's API (not Gmail SMTP —
      # Abdo doesn't want 2FA enabled on his personal Google account, which
      # Gmail App Passwords require) — needs one repo secret set once in
      # Settings > Secrets and variables > Actions > New repository secret:
      #   RESEND_API_KEY — from resend.com's dashboard (Settings > API Keys)
      # Sends from resend.dev's shared address, which works with no domain
      # verification as long as the recipient is the same address the
      # Resend account itself was signed up with.
      - name: Email the report link
        if: steps.trading_day.outputs.is_trading_day == 'true'
        run: |
          curl -fsS -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "Saira Trading Bot <onboarding@resend.dev>",
              "to": ["aboooodymahdy@gmail.com"],
              "subject": "Gann Committee Scanner — daily report ready",
              "html": "<p>Today'\''s report is live: <a href=\"${{ steps.deployment.outputs.page_url }}\">${{ steps.deployment.outputs.page_url }}</a></p>"
            }'

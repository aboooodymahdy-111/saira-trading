# نشر خادم Saira API على Fly.io (الخطة المجانية) — يبني عبر Dockerfile
# الموجود في هذا المجلد لكنه يستوعب المستودع كله (src/ وdata/) كسياق بناء.
app = "saira-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
